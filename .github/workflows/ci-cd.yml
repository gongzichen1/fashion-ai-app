name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        cd src/backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        cd src/backend
        python -m pytest tests/ -v --tb=short --cov=.

    - name: Code quality checks
      run: |
        cd src/backend
        pip install flake8 black isort
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check --diff .
        isort --check-only --diff .

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        cd src/backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build application
      run: |
        cd src/backend
        python -c "import app; print('Application imports successfully')"

    - name: Check for security vulnerabilities
      run: |
        cd src/backend
        pip install safety
        safety check

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - uses: actions/checkout@v4

    - name: Deploy to server
      run: |
        echo "🚀 Deploying to production server..."
        # 这里可以添加你的部署命令
        # 例如: rsync, scp, docker push 等
        echo "✅ Deployment completed!"

  frontend-check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check frontend files
      run: |
        cd src/frontend
        # 检查小程序配置文件
        if [ -f "app.json" ]; then
          echo "✅ app.json exists"
        else
          echo "❌ app.json missing"
          exit 1
        fi

        # 检查主要页面文件
        pages=("index" "camera" "result" "profile")
        for page in "${pages[@]}"; do
          if [ -f "pages/${page}/${page}.js" ] && [ -f "pages/${page}/${page}.wxml" ]; then
            echo "✅ Page ${page} files exist"
          else
            echo "❌ Page ${page} files missing"
            exit 1
          fi
        done

        echo "🎉 Frontend structure check passed!"